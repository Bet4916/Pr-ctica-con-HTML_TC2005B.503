<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>

    <!-- Navbar de Bootstrap -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Mi Sitio</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link active" href="index.html">Login</a></li>
            <li class="nav-item"><a class="nav-link" href="tags.html">Etiquetas</a></li>
            <li class="nav-item"><a class="nav-link" href="profile/index.html">Perfil</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Formulario de login -->
    <div class="contenido">
      <h1>Bienvenido</h1>
      <h2>Iniciar Sesión</h2>

      <div class="mb-3">
        <label for="username"><strong>Usuario:</strong></label>
        <br />
        <input type="text" id="username" name="username" placeholder="Tu usuario (root)" class="form-control" />
      </div>

      <div class="mb-3">
        <label for="password"><strong>Contraseña:</strong></label>
        <br />
        <input type="password" id="password" name="password" placeholder="Tu contraseña (root)" class="form-control" />
      </div>

      <button id="login" class="btn btn-primary">Entrar</button>
    </div>

    <footer>Mi sitio</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
